<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>New Tab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FBFDF9;
            color: #191C1A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #191C1A; color: #E1E3DE; }
            .search-box { background: #282B28; border-color: #3F4943; color: #E1E3DE; }
            .search-box::placeholder { color: #89938D; }
            .shortcut-card { background: #282B28; border-color: #3F4943; }
            .shortcut-card span { color: #E1E3DE; }
            h1 { color: #88D8B5; }
            .subtitle { color: #89938D; }
            .section-title { color: #BFC9C1; }
            .shortcut-icon { background: #333633; }
        }
        h1 {
            font-size: 40px;
            font-weight: 700;
            margin-top: 48px;
            margin-bottom: 4px;
            color: #1B6B52;
        }
        .subtitle {
            font-size: 15px;
            color: #6F7973;
            margin-bottom: 40px;
        }
        .search-box {
            width: 100%;
            max-width: 560px;
            padding: 14px 20px;
            border: 1px solid #BFC9C1;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            background: #EBF0EC;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            border-color: #1B6B52;
            box-shadow: 0 2px 8px rgba(27, 107, 82, 0.15);
        }
        .search-box::placeholder { color: #6F7973; }
        .section-title {
            width: 100%;
            max-width: 560px;
            font-size: 13px;
            font-weight: 600;
            color: #3F4943;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 40px;
            margin-bottom: 16px;
        }
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 560px;
        }
        @media (max-width: 400px) {
            .shortcuts-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .shortcut-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 8px;
            border-radius: 12px;
            background: #EBF0EC;
            border: 1px solid #BFC9C1;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }
        .shortcut-card:active {
            transform: scale(0.95);
        }
        .shortcut-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #D0E8D6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .shortcut-card span {
            font-size: 12px;
            color: #191C1A;
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .info-bar {
            position: fixed;
            bottom: 16px;
            font-size: 12px;
            color: #89938D;
        }
        .ext-badge {
            display: inline-block;
            background: #1B6B52;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <h1>Zenith</h1>
    <p class="subtitle">Fast. Secure. Extensible.</p>

    <form id="searchForm" onsubmit="doSearch(event)">
        <input type="text" class="search-box" id="searchInput"
               placeholder="Search with Google or enter URL"
               autocomplete="off" autocorrect="off" spellcheck="false">
    </form>

    <p class="section-title">Quick Access</p>
    <div class="shortcuts-grid" id="shortcutsGrid">
        <a class="shortcut-card" href="https://www.google.com">
            <div class="shortcut-icon">G</div>
            <span>Google</span>
        </a>
        <a class="shortcut-card" href="https://www.youtube.com">
            <div class="shortcut-icon">&#9654;</div>
            <span>YouTube</span>
        </a>
        <a class="shortcut-card" href="https://www.github.com">
            <div class="shortcut-icon">&#9000;</div>
            <span>GitHub</span>
        </a>
        <a class="shortcut-card" href="https://www.wikipedia.org">
            <div class="shortcut-icon">W</div>
            <span>Wikipedia</span>
        </a>
        <a class="shortcut-card" href="https://www.twitter.com">
            <div class="shortcut-icon">&#120143;</div>
            <span>Twitter / X</span>
        </a>
        <a class="shortcut-card" href="https://www.reddit.com">
            <div class="shortcut-icon">R</div>
            <span>Reddit</span>
        </a>
        <a class="shortcut-card" href="https://stackoverflow.com">
            <div class="shortcut-icon">S</div>
            <span>StackOverflow</span>
        </a>
        <a class="shortcut-card" href="https://www.mozilla.org">
            <div class="shortcut-icon">M</div>
            <span>MDN Docs</span>
        </a>
    </div>

    <div class="info-bar">
        Zenith Browser 1.0.0 &bull; Chromium Engine
        <span class="ext-badge">Extensions Ready</span>
    </div>

    <script>
        function doSearch(e) {
            e.preventDefault();
            var q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            // Try to detect URL
            if (q.match(/^https?:\/\//i) || (q.match(/\.[a-z]{2,}$/i) && !q.match(/\s/))) {
                if (!q.match(/^https?:\/\//i)) q = 'https://' + q;
                window.location.href = q;
            } else {
                window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
            }
        }

        // Focus search on page load
        document.getElementById('searchInput').focus();

        // Communicate with Android
        if (window.__zenithExtension) {
            console.log('Zenith extension bridge available');
        }
    </script>
</body>
</html>
