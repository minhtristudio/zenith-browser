<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>New Tab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(160deg,#1A1111 0%,#2C1513 40%,#1C1B1F 100%);color:#F1DEDC}
.container{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;height:100%;padding:32px 20px 20px}
.logo{width:64px;height:64px;margin-bottom:12px;background:linear-gradient(135deg,#BE0D1E,#FF4757);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(190,13,30,0.5);animation:logoFloat 3s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.logo svg{width:36px;height:36px;fill:white}
.title{font-size:22px;font-weight:700;margin-bottom:20px;background:linear-gradient(90deg,#FFB3AD,#DCC28A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.3px}
.search-box{width:100%;max-width:420px;position:relative;margin-bottom:28px}
.search-input{width:100%;padding:14px 18px 14px 44px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);border-radius:24px;font-size:15px;color:#F1DEDC;outline:none;backdrop-filter:blur(20px);transition:all 0.3s ease}
.search-input:focus{background:rgba(255,255,255,0.1);border-color:rgba(190,13,30,0.5);box-shadow:0 0 0 3px rgba(190,13,30,0.12)}
.search-input::placeholder{color:rgba(255,255,255,0.35)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:0.45}
.shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:420px}
.shortcut{display:flex;flex-direction:column;align-items:center;padding:14px 6px;border-radius:16px;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);transition:all 0.2s ease;text-decoration:none;color:#F1DEDC}
.shortcut:active{background:rgba(190,13,30,0.15);transform:scale(0.95)}
.shortcut-icon{width:42px;height:42px;border-radius:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.shortcut-label{font-size:10.5px;text-align:center;opacity:0.65;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats{margin-top:auto;padding-top:20px;text-align:center}
.stats-row{display:flex;justify-content:center;gap:24px;margin-bottom:8px}
.stat-item{text-align:center}
.stat-value{font-size:18px;font-weight:700;color:#DCC28A}
.stat-label{font-size:10px;opacity:0.4;margin-top:2px}
@media(prefers-color-scheme:light){
html,body{background:linear-gradient(160deg,#FFFBFF 0%,#FFF0EE 40%,#FDF8F5 100%);color:#201A1A}
.title{background:linear-gradient(90deg,#BE0D1E,#705C2E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.search-input{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.06);color:#201A1A}
.search-input:focus{background:rgba(0,0,0,0.05);border-color:rgba(190,13,30,0.25)}
.search-input::placeholder{color:rgba(0,0,0,0.3)}
.search-icon{opacity:0.35}
.shortcut{background:rgba(0,0,0,0.02);border-color:rgba(0,0,0,0.05);color:#201A1A}
.shortcut:active{background:rgba(190,13,30,0.06)}
.shortcut-label{opacity:0.55}
.stat-value{color:#705C2E}
.stat-label{opacity:0.3;color:#201A1A}
}
</style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <div class="title">Zenith Browser</div>
    <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search or enter URL..." id="searchInput" />
    </div>
    <div class="shortcuts">
        <a class="shortcut" href="https://www.google.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#4285F4,#34A853)">G</div>
            <div class="shortcut-label">Google</div>
        </a>
        <a class="shortcut" href="https://www.youtube.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#FF0000,#CC0000)">&#9654;</div>
            <div class="shortcut-label">YouTube</div>
        </a>
        <a class="shortcut" href="https://github.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#333,#555)">&#8963;</div>
            <div class="shortcut-label">GitHub</div>
        </a>
        <a class="shortcut" href="https://www.wikipedia.org">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#636466,#999)">W</div>
            <div class="shortcut-label">Wikipedia</div>
        </a>
        <a class="shortcut" href="https://www.reddit.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#FF4500,#FF6A33)">R</div>
            <div class="shortcut-label">Reddit</div>
        </a>
        <a class="shortcut" href="https://twitter.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#1DA1F2,#0D8BD9)">&#120143;</div>
            <div class="shortcut-label">X</div>
        </a>
        <a class="shortcut" href="https://stackoverflow.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#F48024,#D2691E)">S</div>
            <div class="shortcut-label">StackOverflow</div>
        </a>
        <a class="shortcut" href="https://news.ycombinator.com">
            <div class="shortcut-icon" style="background:linear-gradient(135deg,#FF6600,#CC5200)">Y</div>
            <div class="shortcut-label">HackerNews</div>
        </a>
    </div>
    <div class="stats">
        <div class="stats-row">
            <div class="stat-item"><div class="stat-value" id="tabCount">0</div><div class="stat-label">Tabs</div></div>
            <div class="stat-item"><div class="stat-value" id="extCount">0</div><div class="stat-label">Extensions</div></div>
            <div class="stat-item"><div class="stat-value" id="scriptCount">0</div><div class="stat-label">Scripts</div></div>
        </div>
    </div>
</div>
<script>
document.getElementById('searchInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&this.value.trim()){
        var q=this.value.trim();
        if(/^(https?:\/\/|www\.)/.test(q)){if(q.startsWith('www.'))q='https://'+q;window.location.href=q}
        else if(/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(q)){window.location.href='https://'+q}
        else{window.location.href='https://www.google.com/search?q='+encodeURIComponent(q)}
    }
});
document.getElementById('searchInput').focus();
</script>
</body>
</html>
