name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create proper Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          # Download official gradlew script
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -o gradlew
          chmod +x gradlew
          # Download gradle-wrapper.jar
          curl -sL https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          # Ensure wrapper properties exist
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          echo "Gradle wrapper ready"
          ./gradlew --version

      - name: Create signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore.b64
          base64 -d keystore.b64 > app/release.keystore
          rm keystore.b64

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PkeystoreFile=app/release.keystore \
            -PkeystorePassword=${{ secrets.KEYSTORE_PASSWORD }} \
            -PkeyAlias=${{ secrets.KEY_ALIAS }} \
            -PkeyPassword=${{ secrets.KEY_PASSWORD }}

      - name: Sign APK with v1+v2+v3
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          SIGNED_APK="app/build/outputs/apk/release/zenith-browser-signed.apk"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks app/release.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$APK_PATH"
          $BUILD_TOOLS/apksigner verify --print-certs "$SIGNED_APK"
          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.0.0-$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Zenith Browser ${{ steps.version.outputs.version }}"
          body: |
            ## Zenith Browser ${{ steps.version.outputs.version }}

            ### Features:
            - Chromium WebView engine with full JS/DOM/mixed content
            - Built-in Eruda DevTools (Console, Elements, Network, Sources, Storage)
            - Chrome Extension Support (Manifest V2 & V3)
            - Material 3+ Design with dark mode
            - Multi-tab with incognito, Bookmarks, History, Downloads
            - 8 search engines, Desktop mode, Find in page
            - Android 8+ (API 26)

            **APK Signed:** v1 + v2 + v3
          files: ${{ env.SIGNED_APK }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -f app/release.keystore
